version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: appweave_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: appweave
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: appweave123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
